name: Daily Autonomous YouTube Channel Growth Agent

on:
  schedule:
    # 03:30 AM UTC = 09:00 AM IST (Short 1: Single-Scene Tech Meme)
    - cron: '30 3 * * *'
    # 08:30 AM UTC = 02:00 PM IST (Short 2: 2-Scene Tech Meme)
    - cron: '30 8 * * *'
    # 02:30 PM UTC = 08:00 PM IST (Short 3: Coding Tutorial)
    - cron: '30 14 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI
  repository_dispatch:
    types: [trigger-workflow]

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to push database.json changes back to the repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm ci

      - name: Execute Video Generation & Upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TTS_PROVIDER: edge
          VOICEOVER_LOCALE: en-US-AndrewNeural
          YT_PRIVACY_STATUS: public # Set to 'private' if you want to inspect first
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: |
          # Get current UTC hour
          HOUR=$(date -u +%H)
          # Strip leading zero if present
          HOUR=$((10#$HOUR))
          echo "Current UTC Hour: $HOUR"
          
          # Decide workflow type based on hour
          if [ "$HOUR" -eq 3 ]; then
            echo "Time matches 09:00 AM IST (03:30 UTC). Generating Single-Scene Tech Meme..."
            node src/index.js run-workflow short single_scene_tech
          elif [ "$HOUR" -eq 8 ]; then
            echo "Time matches 02:00 PM IST (08:30 UTC). Generating 2-Scene Tech Meme..."
            node src/index.js run-workflow short meme_tech_2scene
          elif [ "$HOUR" -eq 14 ]; then
            echo "Time matches 08:00 PM IST (14:30 UTC). Generating Coding Tutorial..."
            node src/index.js run-workflow short tutorial
          else
            echo "Manual or unexpected trigger. Defaulting to Single-Scene Tech Meme..."
            node src/index.js run-workflow short single_scene_tech
          fi

      - name: Commit and Persist Database State
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the local database file tracking topic history
          git add database.json
          
          # Check if database has changed, and commit/push if so
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update topic history [skip ci]" && git push)

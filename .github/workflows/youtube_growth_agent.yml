name: Daily Autonomous YouTube Channel Growth Agent

on:
  schedule:
    # 03:30 AM UTC = 09:00 AM IST (Short 1)
    - cron: '30 3 * * *'
    # 01:30 PM UTC = 07:00 PM IST (Long Video)
    - cron: '30 13 * * *'
    # 02:30 PM UTC = 08:00 PM IST (Short 2)
    - cron: '30 14 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to push database.json changes back to the repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgcc1 \
            libgconf-2-4 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            ca-certificates \
            fonts-liberation \
            libappindicator1 \
            libnss3 \
            lsb-release \
            xdg-utils \
            wget

      - name: Install Project Dependencies
        run: npm ci

      - name: Execute Video Generation & Upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TTS_PROVIDER: edge
          VOICEOVER_LOCALE: en-US-AndrewNeural
          YT_PRIVACY_STATUS: public # Set to 'private' if you want to inspect first
        run: |
          # Get current UTC hour
          HOUR=$(date -u +%H)
          echo "Current UTC Hour: $HOUR"
          
          # Decide workflow type based on hour
          if [ "$HOUR" -eq 13 ]; then
            echo "Time matches 07:00 PM IST (13:30 UTC). Generating LONG video..."
            node src/index.js run-workflow long
          else
            echo "Time matches Short scheduled slots. Generating SHORT video..."
            node src/index.js run-workflow short
          fi

      - name: Commit and Persist Database State
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the local database file tracking topic history
          git add database.json
          
          # Check if database has changed, and commit/push if so
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update topic history [skip ci]" && git push)

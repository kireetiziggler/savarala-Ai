<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&family=Inter:wght@800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1280px;
      height: 720px;
      background: radial-gradient(circle at 10% 20%, #1e1b4b 0%, #0b0f19 90%);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Outer Container */
    .thumbnail-container {
      width: 100%;
      height: 100%;
      padding: 60px 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    /* Sleek background decorations */
    .glow-circle {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.25) 0%, rgba(0,0,0,0) 70%);
      top: -100px;
      right: -100px;
      z-index: 1;
    }

    .glow-circle-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, rgba(0,0,0,0) 70%);
      bottom: -100px;
      left: -100px;
      z-index: 1;
    }

    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      z-index: 2;
    }

    /* Left: Text Content */
    .text-section {
      width: 65%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px;
      z-index: 10;
    }

    .badge {
      align-self: flex-start;
      background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      color: #ffffff;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 10px 20px rgba(168, 85, 247, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .headline {
      font-size: 78px;
      font-weight: 900;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: -1px;
      text-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
    }

    .highlight-yellow {
      color: #ffeb3b;
      background: linear-gradient(to bottom, #fffb00, #ffbb00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .highlight-cyan {
      color: #00e5ff;
      background: linear-gradient(to bottom, #00ffff, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Right: Logo / Illustration section */
    .graphic-section {
      width: 30%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      position: relative;
    }

    .logo-container {
      width: 280px;
      height: 280px;
      background: rgba(15, 23, 42, 0.6);
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 25px 50px -12px rgba(0,0,0,0.8),
        0 0 40px rgba(168, 85, 247, 0.2);
      backdrop-filter: blur(10px);
      position: relative;
    }

    .logo-icon {
      width: 170px;
      height: 170px;
      fill: #ffffff;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
    }

    /* SVGs and Logos styling */
    .logo-playwright { color: #2e8b57; }
    .logo-selenium { color: #43b02a; }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="glow-circle"></div>
  <div class="glow-circle-2"></div>

  <div class="thumbnail-container">
    <div class="text-section">
      <div id="badge-text" class="badge">Playwright Tutorial</div>
      <h1 id="headline-text" class="headline">
        You're Doing <br>
        <span class="highlight-yellow">This WRONG!</span>
      </h1>
    </div>

    <div class="graphic-section">
      <div id="logo-wrapper" class="logo-container">
        <!-- SVG container injected dynamically -->
        <svg id="logo-svg" class="logo-icon" viewBox="0 0 24 24">
          <!-- Default vscode editor icon -->
          <path d="M23.907 6.09L12.44.072a.573.573 0 00-.63 0L.092 6.09a.534.534 0 000 .937l11.718 6.018a.573.573 0 00.63 0l11.468-6.018a.534.534 0 000-.938zM12 11.442L2.553 6.558 12 1.674l9.447 4.884L12 11.442zM.093 16.973a.534.534 0 000 .937l11.718 6.018a.573.573 0 00.63 0l11.468-6.018a.534.534 0 000-.938l-11.468-5.891a.573.573 0 00-.63 0L.092 16.973zM12 22.325l-9.447-4.884L12 12.558l9.447 4.884-9.447 4.883z"/>
        </svg>
      </div>
    </div>
  </div>

      </svg>`,
      chatgpt: `<svg class="logo-icon" viewBox="0 0 24 24" fill="#10a37f">
        <path d="M21.74 11.08c-.2-1.3-.98-2.42-2.1-3.08.18-.54.23-1.12.16-1.7-.15-1.28-.88-2.4-1.95-3.06-1-.62-2.22-.69-3.28-.2-.55-.86-1.42-1.5-2.43-1.8-1.28-.38-2.62-.16-3.73.6-1 .69-1.63 1.8-1.75 3.08-.75-.24-1.54-.25-2.3-.02C3.13 5.26 2.1 6.2 1.63 7.4c-.66.86-.94 1.94-.8 3.02.13 1.02.66 1.95 1.48 2.58-.17.54-.22 1.12-.15 1.7.15 1.28.88 2.4 1.95 3.06 1 .62 2.22.69 3.28.2.55.86 1.42 1.5 2.43 1.8 1.28.38 2.62.16 3.73-.6 1-.69 1.63-1.8 1.75-3.08.75.24 1.54.25 2.3.02 1.25-.36 2.28-1.3 2.75-2.5.66-.86.94-1.94.8-3.02-.13-1.02-.66-1.95-1.48-2.58zm-7.74 9.07c-.83.25-1.7.1-2.42-.4l4.28-2.47c.48-.28.8-.78.8-1.34v-5.92l1.93 1.1c.32.18.52.53.52.9v4.95c0 .35-.18.68-.5.87l-4.6 2.65-.01.07zm-7.72-2.42c-.44-.45-.68-1.06-.67-1.7l4.28-2.47c.48-.28.8-.78.8-1.34V6.26L13.36 7.4c.32.18.52.53.52.9v4.95c0 .35-.18.68-.5.87L8.78 16.8c-.14.08-.33.12-.5.12-.2 0-.4-.05-.56-.15l.02-.04zm-1.83-8c-.13-.62.03-1.27.46-1.76l4.28 2.47c.48.28.8.78.8 1.34v5.92L6.15 14.3c-.32-.18-.52-.53-.52-.9v-4.95c0-.44.22-.84.58-1.05l.02-.03zM12.98 4c.83-.25 1.7-.1 2.42.4L11.12 6.87c-.48.28-.8.78-.8 1.34v5.92l-1.93-1.1c-.32-.18-.52-.53-.52-.9V7.18c0-.35.18-.68.5-.87l4.61-2.66V4zm7.72 2.42c.44.45.68 1.06.67 1.7l-4.28 2.47c-.48.28-.8.78-.8 1.34v5.96L14.32 16.8c-.32-.18-.52-.53-.52-.9v-4.95c0-.35.18-.68.5-.87l4.6-2.65c.16-.1.35-.15.54-.15.2 0 .38.05.54.15l.02.04zm1.83 8c.13.62-.03 1.27-.46 1.76l-4.28-2.47c-.48-.28-.8-.78-.8-1.34V6.44l3.13 1.82c.32.18.52.53.52.9v4.95c0 .44-.22.84-.58 1.05l-.02.03zM12 14.28L8 11.97v-4.6l4 2.3 4-2.3v4.6l-4 2.31z"/>
      </svg>`,
      vscode: `<svg class="logo-icon" viewBox="0 0 24 24" fill="#007acc">

      javascript: `<svg class="logo-icon" viewBox="0 0 128 128" fill="#F7DF1E">

        <path d="M111.5 97.4c0 7.8-4.7 13.5-12.7 13.5-6.7 0-11-3.6-13.4-8.8l8.2-4.9c1.6 3 3.6 4.9 6 4.9 2.5 0 4.1-1.3 4.1-4.1V58h9.8v39.4zm-30-1.8c-2.4 5.9-7.8 10.6-15.6 10.6-8.7 0-14.8-6-14.8-15.5 0-10.4 6.7-16 15.6-16 7.1 0 12 4.1 14.1 9.4l-7.9 4.6c-1.3-2.9-3.3-4.8-6.4-4.8-3.9 0-6.4 3-6.4 7s2.5 7.2 6.5 7.2c3.4 0 5.4-2 6.8-5l8.1 4.5z" fill="#000000"/>
      </svg>`
    };

    window.updateThumbnail = function(stateJson) {
      const state = JSON.parse(stateJson);
      
      // Update badge
      document.getElementById('badge-text').innerText = state.badge || 'Playwright';
      
      // Update headline text
      // Support HTML format to allow colors
      let headlineHtml = state.headline || 'YOU\'RE DOING <br><span class="highlight-yellow">IT WRONG!</span>';
      document.getElementById('headline-text').innerHTML = headlineHtml;

      // Update background theme if specified
      if (state.theme === 'neon-purple') {
        document.body.style.background = 'radial-gradient(circle at 10% 20%, #2e0854 0%, #06020c 90%)';
      } else if (state.theme === 'cyberpunk-green') {
        document.body.style.background = 'radial-gradient(circle at 10% 20%, #022c22 0%, #020617 90%)';
      } else if (state.theme === 'ocean-blue') {
        document.body.style.background = 'radial-gradient(circle at 10% 20%, #032b4b 0%, #020617 90%)';
      } else if (state.theme === 'dark-gradient') {
        document.body.style.background = 'radial-gradient(circle at 10% 20%, #111827 0%, #030712 90%)';
      }

      // Update Logo
      const logoWrapper = document.getElementById('logo-wrapper');
      if (state.logo && LOGOS[state.logo.toLowerCase()]) {
        logoWrapper.innerHTML = LOGOS[state.logo.toLowerCase()];
      }
    };
  </script>
</body>
</html>
